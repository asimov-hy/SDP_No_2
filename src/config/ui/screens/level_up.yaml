type: container
id: level_up_root
size: [800, 500]
anchor: center
background: [10, 15, 30, 230]
border: 2
border_color: [120, 120, 140]
border_radius: 10

children:
  # Title
  - type: label
    text: "LEVEL UP!"
    size: [800, 80]
    anchor: top_center
    offset: [0, 40]
    font_size: 48
    text_color: [255, 255, 100]
    text_align: center

  # Instructions
  - type: label
    text: "Choose 1 upgrade:"
    size: [800, 40]
    anchor: top_center
    offset: [0, 120]
    font_size: 24
    text_color: [220, 220, 220]
    text_align: center

  # Upgrades Container (3 random options, player can choose 1)
  - type: container
    size: [750, 280]
    anchor: center
    offset: [0, 50]
    
    children:
      # First Upgrade Button (determined at runtime)
      - type: button
        id: upgrade_btn_1
        text: "Upgrade 1"  # Will be updated at runtime
        action: "upgrade_1"  # Will be updated at runtime
        size: [200, 80]
        anchor: top_center
        offset: [-225, 40]
        color: [80, 60, 60]  # Will be updated at runtime
        hover:
          color: [120, 80, 80]
        font_size: 20
        border: 2
        border_color: [150, 100, 100]
        border_radius: 8

      # Second Upgrade Button (determined at runtime)
      - type: button
        id: upgrade_btn_2
        text: "Upgrade 2"  # Will be updated at runtime
        action: "upgrade_2"  # Will be updated at runtime
        size: [200, 80]
        anchor: top_center
        offset: [0, 40]
        color: [60, 60, 80]  # Will be updated at runtime
        hover:
          color: [80, 80, 120]
        font_size: 20
        border: 2
        border_color: [100, 100, 150]
        border_radius: 8

      # Third Upgrade Button (determined at runtime)
      - type: button
        id: upgrade_btn_3
        text: "Upgrade 3"  # Will be updated at runtime
        action: "upgrade_3"  # Will be updated at runtime
        size: [200, 80]
        anchor: top_center
        offset: [225, 40]
        color: [60, 80, 60]  # Will be updated at runtime
        hover:
          color: [80, 120, 80]
        font_size: 20
        border: 2
        border_color: [100, 150, 100]
        border_radius: 8
