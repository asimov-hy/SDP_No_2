type: container
id: level_up_root
size: [900, 600]
anchor: center
background: [10, 15, 30, 230]
border: 2
border_color: [120, 120, 140]
border_radius: 10

children:
  # Title
  - type: label
    text: "LEVEL UP!"
    size: [900, 80]
    anchor: top_center
    offset: [0, 50]
    font_size: 48
    text_color: [255, 255, 100]
    text_align: center

  # Instructions
  - type: label
    text: "Choose your upgrade:"
    size: [900, 40]
    anchor: top_center
    offset: [0, 140]
    font_size: 24
    text_color: [220, 220, 220]
    text_align: center

  # Upgrades Container (3 fixed options: health, damage, speed)
  - type: container
    size: [850, 320]
    anchor: center
    offset: [0, 60]

    children:
      # Health Upgrade Button
      - type: button
        id: upgrade_btn_health
        text: "Max Health +1"
        action: "upgrade_health"
        size: [220, 400]
        anchor: center
        offset: [-290, 50]
        background: [80, 60, 60]
        hover:
          background: [120, 80, 80]
        font_size: 20
        border: 2
        border_color: [150, 100, 100]
        border_radius: 8

      # Damage Upgrade Button
      - type: button
        id: upgrade_btn_damage
        text: "Damage +20%"
        action: "upgrade_damage"
        size: [220, 400]
        anchor: center
        offset: [0, 50]
        background: [60, 60, 80]
        hover:
          background: [80, 80, 120]
        font_size: 20
        border: 2
        border_color: [100, 100, 150]
        border_radius: 8

      # Speed Upgrade Button
      - type: button
        id: upgrade_btn_speed
        text: "Speed +20%"
        action: "upgrade_speed"
        size: [220, 400]
        anchor: center
        offset: [290, 50]
        background: [60, 80, 60]
        hover:
          background: [80, 120, 80]
        font_size: 20
        border: 2
        border_color: [100, 150, 100]
        border_radius: 8
